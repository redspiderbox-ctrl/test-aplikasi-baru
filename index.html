<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kasir UMKM</title>

<style>

body{
  font-family:Arial;
  background:#f5f5f5;
  padding:20px;
}

.container{
  background:white;
  padding:20px;
  border-radius:10px;
  max-width:500px;
  margin:auto;
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
}

button{
  width:100%;
  padding:12px;
  background:#2196F3;
  color:white;
  border:none;
  margin-top:10px;
  cursor:pointer;
}

table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}

table, th, td{
  border:1px solid #ddd;
}

th, td{
  padding:10px;
  text-align:left;
}

</style>

</head>
<body>

<div class="container">

<h2>Kasir UMKM</h2>

<input type="text" id="kode" placeholder="Kode Barang">
<input type="text" id="nama" placeholder="Nama Barang">
<input type="number" id="harga" placeholder="Harga">
<input type="number" id="qty" placeholder="Qty">

<button onclick="simpanData()">Simpan Transaksi</button>

<table>
<thead>
<tr>
<th>Nama</th>
<th>Qty</th>
<th>Total</th>
</tr>
</thead>

<tbody id="dataBody"></tbody>

</table>

</div>

<script>

const API_URL = "PASTE_LINK_WEB_APP_DISINI";

function simpanData(){

  const kode = document.getElementById("kode").value;
  const nama = document.getElementById("nama").value;
  const harga = document.getElementById("harga").value;
  const qty = document.getElementById("qty").value;

  const total = harga * qty;

  fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      kode:kode,
      nama:nama,
      harga:harga,
      qty:qty,
      total:total
    })
  })

  .then(res => res.json())
  .then(data => {

    alert("Data berhasil disimpan");

    tampilData();

  });

}

function tampilData(){

  fetch(API_URL)
  .then(res => res.json())
  .then(data => {

    let html = "";

    data.reverse().forEach(item => {

      html += `
      <tr>
        <td>${item.nama}</td>
        <td>${item.qty}</td>
        <td>Rp ${item.total}</td>
      </tr>
      `;

    });

    document.getElementById("dataBody").innerHTML = html;

  });

}

tampilData();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kasir UMKM Modern</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="sidebar">

<h2>KASIR PRO</h2>

<ul>
<li>Dashboard</li>
<li>Transaksi</li>
<li>Penjualan</li>
<li>Laporan</li>
<li>Pengaturan</li>
</ul>

</div>

<div class="main">

<div class="topbar">
<h1>Dashboard Kasir</h1>
</div>

<div class="cards">

<div class="card">
<h3>Total Penjualan</h3>
<p id="totalPenjualan">Rp 0</p>
</div>

<div class="card">
<h3>Total Transaksi</h3>
<p id="jumlahTransaksi">0</p>
</div>

</div>

<div class="form-box">

<h2>Input Transaksi</h2>

<input type="text" id="kode" placeholder="Kode Barang">
<input type="text" id="nama" placeholder="Nama Barang">
<input type="number" id="harga" placeholder="Harga">
<input type="number" id="qty" placeholder="Qty">

<button onclick="simpanData()">
Simpan Transaksi
</button>

</div>

<div class="table-box">

<input type="text"
id="search"
placeholder="Cari barang..."
onkeyup="cariData()">

<table>

<thead>

<tr>
<th>Kode</th>
<th>Nama</th>
<th>Harga</th>
<th>Qty</th>
<th>Total</th>
</tr>

</thead>

<tbody id="dataBody"></tbody>

</table>

</div>

</div>

<script src="script.js"></script>

</body>
</html>

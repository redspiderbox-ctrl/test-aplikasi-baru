<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manajemen Sparepart Teknisi</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
--bg: #0a0f1a;
--bg-secondary: #111827;
--card: #1a2332;
--card-hover: #232f42;
--border: #2d3a4f;
--fg: #f1f5f9;
--fg-muted: #94a3b8;
--accent: #00d4aa;
--accent-glow: rgba(0, 212, 170, 0.3);
--danger: #f43f5e;
--warning: #f59e0b;
--info: #3b82f6;
}

.light {
--bg: #f0f4f8;
--bg-secondary: #e2e8f0;
--card: #ffffff;
--card-hover: #f8fafc;
--border: #cbd5e1;
--fg: #0f172a;
--fg-muted: #64748b;
--accent: #059669;
--accent-glow: rgba(5, 150, 105, 0.2);
}

* { box-sizing: border-box; }

body {
font-family: 'Space Grotesk', sans-serif;
background: var(--bg);
color: var(--fg);
margin: 0;
min-height: 100vh;
transition: background 0.4s ease, color 0.4s ease;
}

.bg-pattern {
position: fixed;
top: 0; left: 0;
width: 100%; height: 100%;
z-index: -1;
overflow: hidden;
}

.bg-pattern::before {
content: '';
position: absolute;
top: -50%; left: -50%;
width: 200%; height: 200%;
background: 
radial-gradient(circle at 20% 80%, var(--accent-glow) 0%, transparent 25%),
radial-gradient(circle at 80% 20%, rgba(59, 130, 246, 0.15) 0%, transparent 25%),
radial-gradient(circle at 40% 40%, rgba(168, 85, 247, 0.1) 0%, transparent 30%);
animation: bgFloat 20s ease-in-out infinite;
}

@keyframes bgFloat {
0%, 100% { transform: translate(0, 0) rotate(0deg); }
33% { transform: translate(30px, -30px) rotate(5deg); }
66% { transform: translate(-20px, 20px) rotate(-3deg); }
}

.grid-overlay {
position: fixed;
top: 0; left: 0;
width: 100%; height: 100%;
z-index: -1;
background-image: 
linear-gradient(var(--border) 1px, transparent 1px),
linear-gradient(90deg, var(--border) 1px, transparent 1px);
background-size: 60px 60px;
opacity: 0.03;
}

.main-card {
background: var(--card);
border: 1px solid var(--border);
border-radius: 20px;
box-shadow: 
0 25px 50px -12px rgba(0, 0, 0, 0.25),
0 0 0 1px rgba(255, 255, 255, 0.05) inset;
backdrop-filter: blur(10px);
transition: all 0.3s ease;
}

.main-card:hover {
box-shadow: 
0 30px 60px -15px rgba(0, 0, 0, 0.3),
0 0 0 1px rgba(255, 255, 255, 0.08) inset,
0 0 40px var(--accent-glow);
}

.header-section {
position: relative;
padding: 2rem 2rem 1.5rem;
border-bottom: 1px solid var(--border);
}

.header-section::after {
content: '';
position: absolute;
bottom: 0; left: 50%;
transform: translateX(-50%);
width: 100px; height: 2px;
background: linear-gradient(90deg, transparent, var(--accent), transparent);
}

.title {
font-size: clamp(1.5rem, 4vw, 2rem);
font-weight: 700;
letter-spacing: -0.02em;
background: linear-gradient(135deg, var(--fg) 0%, var(--accent) 100%);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
}

.subtitle {
color: var(--fg-muted);
font-size: 0.9rem;
margin-top: 0.25rem;
}

.stats-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
gap: 1rem;
padding: 1.5rem 2rem;
border-bottom: 1px solid var(--border);
}

.stat-card {
background: var(--bg-secondary);
border: 1px solid var(--border);
border-radius: 12px;
padding: 1rem;
text-align: center;
transition: all 0.3s ease;
}

.stat-card:hover {
transform: translateY(-2px);
border-color: var(--accent);
box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
}

.stat-value {
font-family: 'JetBrains Mono', monospace;
font-size: 1.75rem;
font-weight: 600;
color: var(--accent);
}

.stat-label {
font-size: 0.75rem;
color: var(--fg-muted);
text-transform: uppercase;
letter-spacing: 0.05em;
margin-top: 0.25rem;
}

.controls-section {
padding: 1.5rem 2rem;
border-bottom: 1px solid var(--border);
display: flex;
flex-wrap: wrap;
gap: 0.75rem;
align-items: center;
}

.btn {
display: inline-flex;
align-items: center;
gap: 0.5rem;
padding: 0.625rem 1rem;
border-radius: 10px;
font-family: 'Space Grotesk', sans-serif;
font-size: 0.8rem;
font-weight: 500;
border: 1px solid transparent;
cursor: pointer;
transition: all 0.2s ease;
position: relative;
overflow: hidden;
}

.btn::before {
content: '';
position: absolute;
top: 0; left: -100%;
width: 100%; height: 100%;
background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
transition: left 0.5s ease;
}

.btn:hover::before { left: 100%; }

.btn-primary {
background: var(--accent);
color: #0a0f1a;
}

.btn-primary:hover {
box-shadow: 0 4px 15px var(--accent-glow);
transform: translateY(-1px);
}

.btn-danger {
background: var(--danger);
color: white;
}

.btn-danger:hover {
box-shadow: 0 4px 15px rgba(244, 63, 94, 0.3);
}

.btn-secondary {
background: var(--bg-secondary);
color: var(--fg);
border-color: var(--border);
}

.btn-secondary:hover {
border-color: var(--fg-muted);
background: var(--card-hover);
}

.btn-info {
background: var(--info);
color: white;
}

.btn-warning {
background: var(--warning);
color: #0a0f1a;
}

.btn:active { transform: scale(0.97); }

.file-wrapper {
position: relative;
}

.file-input {
position: absolute;
opacity: 0;
width: 100%; height: 100%;
cursor: pointer;
}

.file-label {
display: inline-flex;
align-items: center;
gap: 0.5rem;
padding: 0.625rem 1rem;
background: var(--bg-secondary);
border: 2px dashed var(--border);
border-radius: 10px;
font-size: 0.8rem;
color: var(--fg-muted);
cursor: pointer;
transition: all 0.3s ease;
}

.file-label:hover,
.file-wrapper:hover .file-label {
border-color: var(--accent);
color: var(--accent);
background: var(--card-hover);
}

.table-section {
padding: 1.5rem 2rem;
overflow-x: auto;
}

.data-table {
width: 100%;
border-collapse: separate;
border-spacing: 0;
font-size: 0.8rem;
}

.data-table th {
background: var(--bg-secondary);
color: var(--fg-muted);
font-weight: 600;
text-transform: uppercase;
letter-spacing: 0.05em;
font-size: 0.7rem;
padding: 1rem 0.75rem;
text-align: left;
border-bottom: 1px solid var(--border);
position: sticky;
top: 0;
z-index: 10;
}

.data-table th:first-child { border-radius: 10px 0 0 0; }
.data-table th:last-child { border-radius: 0 10px 0 0; }

.data-table td {
padding: 0.75rem;
border-bottom: 1px solid var(--border);
transition: all 0.2s ease;
color: var(--fg);
}

.data-table tbody tr { transition: all 0.2s ease; }
.data-table tbody tr:hover { background: var(--card-hover); }

.data-table tbody tr.selected {
background: rgba(244, 63, 94, 0.1);
box-shadow: inset 3px 0 0 var(--danger);
}

.data-table td[contenteditable="true"]:focus {
outline: none;
background: var(--bg-secondary);
box-shadow: inset 0 0 0 2px var(--accent);
border-radius: 4px;
}

.data-table tbody tr {
animation: rowFadeIn 0.4s ease forwards;
opacity: 0;
}

@keyframes rowFadeIn {
from { opacity: 0; transform: translateX(-10px); }
to { opacity: 1; transform: translateX(0); }
}

.empty-state {
text-align: center;
padding: 4rem 2rem;
color: var(--fg-muted);
}

.empty-icon {
width: 80px; height: 80px;
margin: 0 auto 1rem;
opacity: 0.3;
}

.theme-toggle {
position: fixed;
top: 1.5rem; right: 1.5rem;
width: 50px; height: 50px;
border-radius: 50%;
background: var(--card);
border: 1px solid var(--border);
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
transition: all 0.3s ease;
z-index: 100;
box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
}

.theme-toggle:hover {
transform: scale(1.1);
border-color: var(--accent);
}

.theme-toggle svg {
width: 24px; height: 24px;
color: var(--fg);
transition: transform 0.5s ease;
}

.theme-toggle:hover svg { transform: rotate(180deg); }

.toast {
position: fixed;
bottom: 2rem; right: 2rem;
padding: 1rem 1.5rem;
background: var(--card);
border: 1px solid var(--border);
border-radius: 12px;
box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
display: flex;
align-items: center;
gap: 0.75rem;
transform: translateX(calc(100% + 3rem));
transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
z-index: 1000;
}

.toast.show { transform: translateX(0); }
.toast-success { border-left: 4px solid var(--accent); }
.toast-error { border-left: 4px solid var(--danger); }

@media (max-width: 768px) {
.controls-section { padding: 1rem; }
.stats-grid { padding: 1rem; grid-template-columns: repeat(2, 1fr); }
.table-section { padding: 1rem; }
.header-section { padding: 1.5rem 1rem 1rem; }
.data-table { font-size: 0.7rem; }
.data-table th, .data-table td { padding: 0.5rem; }
.btn { padding: 0.5rem 0.75rem; font-size: 0.75rem; }
}

@media (prefers-reduced-motion: reduce) {
*, *::before, *::after {
animation-duration: 0.01ms !important;
transition-duration: 0.01ms !important;
}
}
</style>
</head>

<body>
<div class="bg-pattern"></div>
<div class="grid-overlay"></div>

<button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
<svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
</svg>
</button>

<div class="main-card max-w-7xl mx-auto my-8">
<div class="header-section">
<h1 class="title">Manajemen Sparepart Teknisi</h1>
<p class="subtitle">Sistem inventaris dan pelacakan komponen</p>
</div>

<div class="stats-grid">
<div class="stat-card">
<div class="stat-value" id="totalItems">0</div>
<div class="stat-label">Total Item</div>
</div>
<div class="stat-card">
<div class="stat-value" id="totalQty">0</div>
<div class="stat-label">Total Qty</div>
</div>
<div class="stat-card">
<div class="stat-value" id="uniqueParts">0</div>
<div class="stat-label">Part Unik</div>
</div>
<div class="stat-card">
<div class="stat-value" id="uniqueTech">0</div>
<div class="stat-label">Teknisi</div>
</div>
</div>

<div class="controls-section">
<div class="file-wrapper">
<input type="file" id="upload" accept=".xlsx,.xls,.csv" class="file-input">
<label class="file-label">
<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
<polyline points="17 8 12 3 7 8"></polyline>
<line x1="12" y1="3" x2="12" y2="15"></line>
</svg>
Import File
</label>
</div>

<button class="btn btn-primary" onclick="addRow()">
<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
<line x1="12" y1="5" x2="12" y2="19"></line>
<line x1="5" y1="12" x2="19" y2="12"></line>
</svg>
Tambah
</button>

<button class="btn btn-danger" onclick="deleteRow()">
<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
<polyline points="3 6 5 6 21 6"></polyline>
<path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
</svg>
Hapus
</button>

<button class="btn btn-secondary" onclick="resetTable()">
<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
<path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
<path d="M3 3v5h5"></path>
</svg>
Reset
</button>

<div style="flex-grow: 1;"></div>

<button class="btn btn-info" onclick="downloadExcel()">
<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
<polyline points="14 2 14 8 20 8"></polyline>
<line x1="16" y1="13" x2="8" y2="13"></line>
<line x1="16" y1="17" x2="8" y2="17"></line>
</svg>
Excel
</button>

<button class="btn btn-warning" onclick="downloadPDF()">
<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
<polyline points="14 2 14 8 20 8"></polyline>
</svg>
PDF
</button>
</div>

<div class="table-section" id="tableContainer">
<table class="data-table" id="dataTable">
<thead>
<tr>
<th>No</th>
<th>Catatan</th>
<th>Part</th>
<th>Qty</th>
<th>Part Demand</th>
<th>Serial Number</th>
<th>Teknisi Perbaikan</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>
</div>

<div class="toast" id="toast">
<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
<polyline points="22 4 12 14.01 9 11.01"></polyline>
</svg>
<span id="toastMessage">Operasi berhasil</span>
</div>

<script>
let tableData = [];
let selectedRow = null;

document.addEventListener('DOMContentLoaded', function() {
updateStats();
displayData();
});

function toggleTheme() {
document.body.classList.toggle('light');
const icon = document.getElementById('themeIcon');
if (document.body.classList.contains('light')) {
icon.innerHTML = '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
} else {
icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
}
}

function showToast(message, type = 'success') {
const toast = document.getElementById('toast');
const toastMessage = document.getElementById('toastMessage');
toast.className = 'toast toast-' + type + ' show';
toastMessage.textContent = message;
setTimeout(function() {
toast.classList.remove('show');
}, 3000);
}

function updateStats() {
const totalItems = tableData.length;
const totalQty = tableData.reduce(function(sum, row) {
return sum + (parseInt(row["Qty"]) || 0);
}, 0);
const uniqueParts = new Set(tableData.map(function(row) { return row["Part"]; })).size;
const uniqueTech = new Set(tableData.map(function(row) { return row["Teknisi Perbaikan"]; }).filter(Boolean)).size;

document.getElementById('totalItems').textContent = totalItems;
document.getElementById('totalQty').textContent = totalQty;
document.getElementById('uniqueParts').textContent = uniqueParts;
document.getElementById('uniqueTech').textContent = uniqueTech;
}

document.getElementById('upload').addEventListener('change', function(e) {
const file = e.target.files[0];
if (!file) return;

const reader = new FileReader();
reader.onload = function(evt) {
try {
const data = new Uint8Array(evt.target.result);
const workbook = XLSX.read(data, { type: 'array' });
const sheet = workbook.Sheets[workbook.SheetNames[0]];
const json = XLSX.utils.sheet_to_json(sheet);
tableData = json;
displayData();
updateStats();
showToast('File berhasil diimpor: ' + json.length + ' baris data');
} catch (error) {
showToast('Gagal membaca file', 'error');
}
};
reader.readAsArrayBuffer(file);
});

function displayData() {
const tbody = document.getElementById('tableBody');
tbody.innerHTML = '';

if (tableData.length === 0) {
tbody.innerHTML = '<tr><td colspan="7" class="empty-state"><svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg><p style="font-size: 1rem; font-weight: 500; margin-bottom: 0.25rem;">Belum ada data</p><p style="font-size: 0.8rem;">Import file atau tambah data baru</p></td></tr>';
return;
}

tableData.forEach(function(row, i) {
let tr = document.createElement('tr');
tr.style.animationDelay = (i * 0.05) + 's';

tr.onclick = function() {
document.querySelectorAll('#tableBody tr').forEach(function(r) {
r.classList.remove('selected');
});
tr.classList.add('selected');
selectedRow = i;
};

tr.innerHTML = 
'<td contenteditable="true">' + (row["No"] ?? (i + 1)) + '</td>' +
'<td contenteditable="true">' + (row["Catatan"] ?? "") + '</td>' +
'<td contenteditable="true">' + (row["Part"] ?? "") + '</td>' +
'<td contenteditable="true">' + (row["Qty"] ?? "") + '</td>' +
'<td contenteditable="true">' + (row["Part Demand"] ?? "") + '</td>' +
'<td contenteditable="true">' + (row["Serial Number"] ?? "") + '</td>' +
'<td contenteditable="true">' + (row["Teknisi Perbaikan"] ?? "") + '</td>';

tbody.appendChild(tr);
});
}

function addRow() {
tableData.push({
"No": tableData.length + 1,
"Catatan": "",
"Part": "",
"Qty": "",
"Part Demand": "",
"Serial Number": "",
"Teknisi Perbaikan": ""
});
displayData();
updateStats();
showToast('Baris baru ditambahkan');
}

function deleteRow() {
if (selectedRow === null) {
showToast('Pilih baris terlebih dahulu', 'error');
return;
}
tableData.splice(selectedRow, 1);
selectedRow = null;
displayData();
updateStats();
showToast('Baris berhasil dihapus');
}

function resetTable() {
if (tableData.length === 0) {
showToast('Tabel sudah kosong', 'error');
return;
}
if (confirm('Hapus semua data?')) {
tableData = [];
selectedRow = null;
displayData();
updateStats();
showToast('Semua data telah dihapus');
}
}

function readTable() {
let rows = document.querySelectorAll('#tableBody tr');
tableData = [];
rows.forEach(function(r) {
let c = r.children;
if (c.length === 7) {
tableData.push({
"No": c[0].innerText,
"Catatan": c[1].innerText,
"Part": c[2].innerText,
"Qty": c[3].innerText,
"Part Demand": c[4].innerText,
"Serial Number": c[5].innerText,
"Teknisi Perbaikan": c[6].innerText
});
}
});
updateStats();
}

function downloadExcel() {
if (tableData.length === 0) {
showToast('Tidak ada data untuk diunduh', 'error');
return;
}
readTable();
let ws = XLSX.utils.json_to_sheet(tableData);
let wb = XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb, ws, "Data");
XLSX.writeFile(wb, "data sparepart.xlsx");
showToast('File Excel berhasil diunduh');
}

// === FUNGSI PDF: TEKS BOLD TERANG & TEBAL ===
function downloadPDF() {
if (tableData.length === 0) {
showToast('Tidak ada data untuk diunduh', 'error');
return;
}
readTable();

const { jsPDF } = window.jspdf;

let doc = new jsPDF({
orientation: 'portrait',
unit: 'mm',
format: 'a4'
});

// === HEADER: TEKS BOLD DAN TERANG ===
// Set warna hitam pekat (terang/kontras tinggi)
doc.setTextColor(0, 0, 0); 
doc.setFontSize(18);
doc.setFont(undefined, 'bold'); // Teks Bold
doc.text("Data Sparepart Teknisi", 14, 15);

// Sub-header
doc.setFontSize(10);
doc.setFont(undefined, 'bold'); // Tanggal juga bold
doc.setTextColor(50, 50, 50); // Sedikit lebih terang dari hitam
doc.text("KUPANG, Tanggal : " + new Date().toLocaleDateString('id-ID'), 14, 22);

// Siapkan Data
let rows = [];
tableData.forEach(function(r) {
rows.push([
r["No"],
r["Catatan"],
r["Part"],
r["Qty"],
r["Part Demand"],
r["Serial Number"],
r["Teknisi Perbaikan"]
]);
});

// === TABEL: GARIS TEBAL & FLEKSIBEL ===
doc.autoTable({
head: [["No", "Catatan", "Part", "Qty", "Part Demand", "Serial Number", "Teknisi Perbaikan"]],
body: rows,
startY: 28,
theme: 'grid',
styles: {
fontSize: 6,
cellPadding: 2.5,
overflow: 'linebreak',
halign: 'left',
lineColor: [0, 0, 0], // Warna garis hitam pekat

<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>POS KASIR MODERN</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #f4f6f9;
      overflow-x: hidden;
    }

    .sidebar {
      width: 250px;
      height: 100vh;
      position: fixed;
      background: #111827;
      color: white;
      padding-top: 20px;
    }

    .sidebar h3 {
      text-align: center;
      margin-bottom: 30px;
      font-weight: 600;
    }

    .sidebar a {
      display: block;
      color: #d1d5db;
      padding: 15px 20px;
      text-decoration: none;
      transition: 0.3s;
    }

    .sidebar a:hover {
      background: #1f2937;
      color: white;
    }

    .content {
      margin-left: 250px;
      padding: 20px;
    }

    .card-box {
      border: none;
      border-radius: 16px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      transition: 0.3s;
    }

    .card-box:hover {
      transform: translateY(-3px);
    }

    .login-box {
      width: 350px;
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    .center-screen {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .hidden {
      display: none;
    }

    .table {
      background: white;
      border-radius: 15px;
      overflow: hidden;
    }

    .btn-modern {
      border-radius: 12px;
    }

    .fade-in {
      animation: fade 0.5s ease;
    }

    @keyframes fade {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <!-- LOGIN -->
  <div id="loginPage" class="center-screen">

    <div class="login-box fade-in">

      <h3 class="text-center mb-4">POS KASIR</h3>

      <input type="text" id="username" class="form-control mb-3" placeholder="Username">

      <input type="password" id="password" class="form-control mb-3" placeholder="Password">

      <button onclick="login()" class="btn btn-dark w-100 btn-modern">
        LOGIN
      </button>

    </div>

  </div>

  <!-- DASHBOARD -->
  <div id="dashboardPage" class="hidden">

    <!-- SIDEBAR -->
    <div class="sidebar">

      <h3>POS MODERN</h3>

      <a href="#">Dashboard</a>
      <a href="#">Kasir</a>
      <a href="#">Data Penjualan</a>
      <a href="#">Laporan</a>
      <a href="#">Pengaturan</a>

    </div>

    <!-- CONTENT -->
    <div class="content fade-in">

      <div class="row mb-4">

        <div class="col-md-4">
          <div class="card card-box p-4">
            <h5>Total Penjualan</h5>
            <h2>Rp 0</h2>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card card-box p-4">
            <h5>Total Produk</h5>
            <h2>0</h2>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card card-box p-4">
            <h5>Total Transaksi</h5>
            <h2>0</h2>
          </div>
        </div>

      </div>

      <!-- FORM -->
      <div class="card card-box p-4 mb-4">

        <h4 class="mb-4">Input Transaksi</h4>

        <div class="row">

          <div class="col-md-3">
            <input type="text" id="nama" class="form-control" placeholder="Nama Barang">
          </div>

          <div class="col-md-2">
            <input type="text" id="kategori" class="form-control" placeholder="Kategori">
          </div>

          <div class="col-md-2">
            <input type="number" id="harga" class="form-control" placeholder="Harga">
          </div>

          <div class="col-md-2">
            <input type="number" id="qty" class="form-control" placeholder="Qty">
          </div>

          <div class="col-md-3">
            <button onclick="saveData()" class="btn btn-primary w-100 btn-modern">
              Simpan
            </button>
          </div>

        </div>

      </div>

      <!-- TABLE -->
      <div class="card card-box p-4">

        <h4 class="mb-4">Data Penjualan</h4>

        <div class="table-responsive">

          <table class="table table-bordered align-middle">

            <thead class="table-dark">

              <tr>
                <th>ID</th>
                <th>Tanggal</th>
                <th>Nama Barang</th>
                <th>Kategori</th>
                <th>Harga</th>
                <th>Qty</th>
                <th>Total</th>
              </tr>

            </thead>

            <tbody id="tableData"></tbody>

          </table>

        </div>

      </div>

    </div>

  </div>

  <script>

    // LOGIN
    function login() {

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      if (username === 'admin' && password === 'admin') {

        document.getElementById('loginPage').classList.add('hidden');

        document.getElementById('dashboardPage').classList.remove('hidden');

        loadData();

      } else {

        alert('Username / Password salah');

      }
    }

    // SAVE DATA
    function saveData() {

      const data = {
        nama: document.getElementById('nama').value,
        kategori: document.getElementById('kategori').value,
        harga: document.getElementById('harga').value,
        qty: document.getElementById('qty').value
      };

      google.script.run
        .withSuccessHandler(function(res) {

          alert(res.message);

          loadData();

          document.getElementById('nama').value = '';
          document.getElementById('kategori').value = '';
          document.getElementById('harga').value = '';
          document.getElementById('qty').value = '';

        })
        .saveData(data);
    }

    // LOAD DATA
    function loadData() {

      google.script.run
        .withSuccessHandler(function(data) {

          let html = '';

          for (let i = 1; i < data.length; i++) {

            html += `
              <tr>
                <td>${data[i][0]}</td>
                <td>${data[i][1]}</td>
                <td>${data[i][2]}</td>
                <td>${data[i][3]}</td>
                <td>Rp ${data[i][4]}</td>
                <td>${data[i][5]}</td>
                <td>Rp ${data[i][6]}</td>
              </tr>
            `;
          }

          document.getElementById('tableData').innerHTML = html;

        })
        .getData();
    }

  </script>

</body>
</html>

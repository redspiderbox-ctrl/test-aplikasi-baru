<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>POS Kasir Modern</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<style>

body{
    background:#f4f6f9;
    font-family:'Segoe UI',sans-serif;
}

.sidebar{
    width:250px;
    height:100vh;
    position:fixed;
    background:#1e293b;
    color:white;
    padding:20px;
}

.sidebar h3{
    margin-bottom:30px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:12px;
    border-radius:10px;
    margin-bottom:10px;
    transition:0.3s;
}

.sidebar a:hover{
    background:#334155;
}

.main{
    margin-left:260px;
    padding:20px;
}

.card{
    border:none;
    border-radius:20px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.login-box{
    width:350px;
    margin:auto;
    margin-top:100px;
}

.hidden{
    display:none;
}

.table{
    background:white;
}

@media(max-width:768px){

.sidebar{
    width:100%;
    height:auto;
    position:relative;
}

.main{
    margin-left:0;
}

}

</style>

</head>
<body>

<!-- LOGIN -->

<div id="loginPage">

<div class="login-box">

<div class="card p-4">

<h3 class="text-center mb-4">
<i class="fa fa-store"></i>
POS KASIR
</h3>

<input type="text" id="username" class="form-control mb-3" placeholder="Username">

<input type="password" id="password" class="form-control mb-3" placeholder="Password">

<button class="btn btn-dark w-100" onclick="login()">
LOGIN
</button>

<p id="loginMsg" class="text-danger mt-3 text-center"></p>

</div>

</div>

</div>

<!-- DASHBOARD -->

<div id="dashboardPage" class="hidden">

<div class="sidebar">

<h3>POS MODERN</h3>

<a href="#">
<i class="fa fa-chart-line"></i>
Dashboard
</a>

<a href="#">
<i class="fa fa-box"></i>
Produk
</a>

<a href="#">
<i class="fa fa-cash-register"></i>
Kasir
</a>

<a href="#">
<i class="fa fa-receipt"></i>
Transaksi
</a>

<a href="#">
<i class="fa fa-gear"></i>
Pengaturan
</a>

</div>

<div class="main">

<div class="row">

<div class="col-md-4 mb-3">

<div class="card p-4">

<h5>Total Produk</h5>

<h2 id="totalProduk">0</h2>

</div>

</div>

<div class="col-md-4 mb-3">

<div class="card p-4">

<h5>Total Penjualan</h5>

<h2>Rp 0</h2>

</div>

</div>

<div class="col-md-4 mb-3">

<div class="card p-4">

<h5>Total Transaksi</h5>

<h2>0</h2>

</div>

</div>

</div>

<div class="card p-4 mt-4">

<h4 class="mb-3">Tambah Produk</h4>

<div class="row">

<div class="col-md-3">
<input type="text" id="kode" class="form-control" placeholder="Kode">
</div>

<div class="col-md-3">
<input type="text" id="nama" class="form-control" placeholder="Nama Produk">
</div>

<div class="col-md-2">
<input type="number" id="harga" class="form-control" placeholder="Harga">
</div>

<div class="col-md-2">
<input type="number" id="stok" class="form-control" placeholder="Stok">
</div>

<div class="col-md-2">
<button class="btn btn-primary w-100" onclick="tambahProduk()">
Simpan
</button>
</div>

</div>

</div>

<div class="card p-4 mt-4">

<h4 class="mb-3">Data Produk</h4>

<div class="table-responsive">

<table class="table table-bordered">

<thead>

<tr>
<th>Kode</th>
<th>Nama</th>
<th>Harga</th>
<th>Stok</th>
<th>Tanggal</th>
</tr>

</thead>

<tbody id="produkTable">

</tbody>

</table>

</div>

</div>

</div>

</div>

<script>

function login(){

  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;

  google.script.run
  .withSuccessHandler(function(res){

      if(res.status){

          document.getElementById('loginPage').classList.add('hidden');

          document.getElementById('dashboardPage').classList.remove('hidden');

          loadProduk();

      }else{

          document.getElementById('loginMsg').innerHTML = res.message;

      }

  })
  .login({
      username:username,
      password:password
  });

}

// TAMBAH PRODUK

function tambahProduk(){

  const data = {

      kode:document.getElementById('kode').value,
      nama:document.getElementById('nama').value,
      harga:document.getElementById('harga').value,
      stok:document.getElementById('stok').value

  };

  google.script.run
  .withSuccessHandler(function(res){

      alert(res);

      loadProduk();

      document.getElementById('kode').value='';
      document.getElementById('nama').value='';
      document.getElementById('harga').value='';
      document.getElementById('stok').value='';

  })
  .tambahProduk(data);

}

// LOAD DATA

function loadProduk(){

  google.script.run
  .withSuccessHandler(function(data){

      let html = '';

      data.forEach(function(row){

          html += `
          <tr>
              <td>${row[0]}</td>
              <td>${row[1]}</td>
              <td>Rp ${row[2]}</td>
              <td>${row[3]}</td>
              <td>${row[4]}</td>
          </tr>
          `;

      });

      document.getElementById('produkTable').innerHTML = html;

      document.getElementById('totalProduk').innerHTML = data.length;

  })
  .getProduk();

}

</script>

</body>
</html>

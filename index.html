<!DOCTYPE html>
<html>
<head>
  <base target="_top">

  <style>

    body{
      font-family: Arial;
      background:#f5f5f5;
      padding:20px;
    }

    .box{
      background:white;
      padding:20px;
      border-radius:10px;
      max-width:500px;
      margin:auto;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    h2{
      text-align:center;
    }

    input{
      width:100%;
      padding:10px;
      margin-top:10px;
      border:1px solid #ccc;
      border-radius:5px;
    }

    button{
      width:100%;
      padding:12px;
      margin-top:15px;
      background:#2196F3;
      color:white;
      border:none;
      border-radius:5px;
      font-size:16px;
      cursor:pointer;
    }

    button:hover{
      background:#1976D2;
    }

    table{
      width:100%;
      margin-top:20px;
      border-collapse:collapse;
      background:white;
    }

    table, th, td{
      border:1px solid #ddd;
    }

    th, td{
      padding:10px;
      text-align:center;
    }

    .total{
      font-size:20px;
      font-weight:bold;
      margin-top:10px;
      color:green;
    }

  </style>
</head>

<body>

<div class="box">

<h2>KASIR UMKM</h2>

<input type="text" id="nama" placeholder="Nama Barang">

<input type="number" id="harga" placeholder="Harga">

<input type="number" id="qty" placeholder="Qty" onkeyup="hitungTotal()">

<div class="total">
Total : Rp <span id="total">0</span>
</div>

<button onclick="simpan()">Simpan Transaksi</button>

</div>

<table id="tabel">

</table>

<script>

function hitungTotal(){

  var harga = document.getElementById("harga").value || 0;
  var qty = document.getElementById("qty").value || 0;

  var total = harga * qty;

  document.getElementById("total").innerHTML =
  total.toLocaleString('id-ID');
}

function simpan(){

  var nama = document.getElementById("nama").value;
  var harga = document.getElementById("harga").value;
  var qty = document.getElementById("qty").value;

  var total = harga * qty;

  var data = {
    nama:nama,
    harga:harga,
    qty:qty,
    total:total
  };

  google.script.run
  .withSuccessHandler(function(res){

    alert(res);

    document.getElementById("nama").value="";
    document.getElementById("harga").value="";
    document.getElementById("qty").value="";
    document.getElementById("total").innerHTML="0";

    loadData();

  })
  .simpanData(data);
}

function loadData(){

google.script.run.withSuccessHandler(function(data){

  var html = `
  <tr>
    <th>Tanggal</th>
    <th>Barang</th>
    <th>Harga</th>
    <th>Qty</th>
    <th>Total</th>
  </tr>
  `;

  for(var i=1; i<data.length; i++){

    html += `
    <tr>
      <td>${data[i][0]}</td>
      <td>${data[i][1]}</td>
      <td>${data[i][2]}</td>
      <td>${data[i][3]}</td>
      <td>Rp ${Number(data[i][4]).toLocaleString('id-ID')}</td>
    </tr>
    `;
  }

  document.getElementById("tabel").innerHTML = html;

}).getData();

}

loadData();

</script>

</body>
</html>
